services:
  openclaw:
    build:
      context: .
      dockerfile: openclaw/Dockerfile
    restart: unless-stopped
    expose:
      - "18789"
    environment:
      - GOOGLE_API_KEY=${GEMINI_API_KEY:-}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - OPENCLAW_GATEWAY_BIND=lan
      - TZ=Asia/Jakarta
    volumes:
      - openclaw-config:/home/node/.openclaw
      - openclaw-workspace:/home/node/.openclaw/workspace
      - ./openclaw/openclaw.json:/openclaw-static/openclaw.json:ro
      - ./skills:/openclaw-static/skills:ro
      - ./openclaw-start.sh:/openclaw-start.sh:ro
    entrypoint: ["/bin/sh", "/openclaw-start.sh"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:18789/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - default

  app:
    build: .
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
      openclaw:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-postgresql://zeniclaw:zeniclaw@db:5432/zeniclaw}
      - APP_URL=${APP_URL:-https://zeniclaw.zenova.id}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-}
      - AUTH_SECRET=${NEXTAUTH_SECRET:-}
      - OPENCLAW_URL=${OPENCLAW_URL:-http://openclaw:18789}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
    labels:
      - traefik.enable=true
      - traefik.http.routers.zeniclaw.rule=Host(`zeniclaw.zenova.id`)
      - traefik.http.routers.zeniclaw.entrypoints=https
      - traefik.http.routers.zeniclaw.tls=true
      - traefik.http.routers.zeniclaw.tls.certresolver=letsencrypt
      - traefik.http.services.zeniclaw.loadbalancer.server.port=3000
      - traefik.http.routers.zeniclaw-http.rule=Host(`zeniclaw.zenova.id`)
      - traefik.http.routers.zeniclaw-http.entrypoints=http
      - traefik.http.routers.zeniclaw-http.middlewares=redirect-to-https
    networks:
      - coolify
      - default

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: zeniclaw
      POSTGRES_PASSWORD: zeniclaw
      POSTGRES_DB: zeniclaw
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeniclaw"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default

networks:
  coolify:
    external: true
  default:
    driver: bridge

volumes:
  postgres_data:
  openclaw-config:
  openclaw-workspace:
