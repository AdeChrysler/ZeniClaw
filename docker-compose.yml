services:
  autoheal:
    image: willfarrell/autoheal:latest
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=10
      - AUTOHEAL_START_PERIOD=0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - default

  openclaw:
    build:
      context: .
      dockerfile: openclaw/Dockerfile
    restart: unless-stopped
    expose:
      - "18789"
    environment:
      - HOME=/home/node
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_API_KEY=${GEMINI_API_KEY:-}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - TZ=Asia/Jakarta
      # Limit V8 heap to 820MB — openclaw gateway OOMs without this.
      # Container limit is 1024MB; this prevents crash loops every ~10s.
      - NODE_OPTIONS=--max-old-space-size=820
    volumes:
      - openclaw-sessions:/home/node/.openclaw/sessions
      - openclaw-agents:/home/node/.openclaw/agents
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 150s
    deploy:
      resources:
        limits:
          memory: 1024M
    labels:
      - autoheal=true
    networks:
      - default

  app:
    build: .
    restart: always
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/ping').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1024M
    depends_on:
      db:
        condition: service_healthy
      openclaw:
        condition: service_started
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-postgresql://zeniclaw:zeniclaw@db:5432/zeniclaw?connection_limit=5&pool_timeout=4}
      - APP_URL=${APP_URL:-https://zeniclaw.zenova.id}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-}
      - AUTH_SECRET=${NEXTAUTH_SECRET:-}
      - OPENCLAW_URL=${OPENCLAW_URL:-http://openclaw:18789}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      # Limit V8 heap to 820MB — prevents OOM kill (container limit: 1024MB).
      - NODE_OPTIONS=--max-old-space-size=820
    labels:
      - traefik.enable=true
      - traefik.http.routers.zeniclaw.rule=Host(`zeniclaw.zenova.id`)
      - traefik.http.routers.zeniclaw.entrypoints=https
      - traefik.http.routers.zeniclaw.tls=true
      - traefik.http.routers.zeniclaw.tls.certresolver=letsencrypt
      - traefik.http.services.zeniclaw.loadbalancer.server.port=3000
      # HTTP router: required for Cloudflare Flexible SSL mode (CF connects to origin via HTTP)
      - traefik.http.routers.zeniclaw-http.rule=Host(`zeniclaw.zenova.id`)
      - traefik.http.routers.zeniclaw-http.entrypoints=http
      - traefik.http.routers.zeniclaw-http.service=zeniclaw
    networks:
      - coolify
      - default

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: zeniclaw
      POSTGRES_PASSWORD: zeniclaw
      POSTGRES_DB: zeniclaw
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeniclaw"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default

networks:
  coolify:
    external: true
  default:
    driver: bridge

volumes:
  postgres_data:
  openclaw-sessions:
  openclaw-agents:
