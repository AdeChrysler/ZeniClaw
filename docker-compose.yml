services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - WAHA_URL=${WAHA_URL:-http://waha.sixzenith.space:3003}
      - WAHA_API_KEY=${WAHA_API_KEY:-666}
      - APP_URL=${APP_URL:-https://zeniclaw.zenova.id}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
