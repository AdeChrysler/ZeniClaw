services:
  app:
    build: .
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
      openclaw:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-postgresql://zeniclaw:zeniclaw@db:5432/zeniclaw}
      - WAHA_URL=${WAHA_URL:-http://waha.sixzenith.com:3003}
      - WAHA_API_KEY=${WAHA_API_KEY:-666}
      - APP_URL=${APP_URL:-https://zeniclaw.zenova.id}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-}
      - AUTH_SECRET=${NEXTAUTH_SECRET:-}
      - OPENCLAW_URL=${OPENCLAW_URL:-http://openclaw:18789}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-zeniclaw-gateway-secret}
    labels:
      - traefik.enable=true
      - traefik.http.routers.zeniclaw.rule=Host(`zeniclaw.zenova.id`)
      - traefik.http.routers.zeniclaw.entrypoints=https
      - traefik.http.routers.zeniclaw.tls=true
      - traefik.http.routers.zeniclaw.tls.certresolver=letsencrypt
      - traefik.http.services.zeniclaw.loadbalancer.server.port=3000
      - traefik.http.routers.zeniclaw-http.rule=Host(`zeniclaw.zenova.id`)
      - traefik.http.routers.zeniclaw-http.entrypoints=http
      - traefik.http.routers.zeniclaw-http.middlewares=redirect-to-https
    networks:
      - coolify
      - default

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    restart: unless-stopped
    command: ["openclaw", "gateway", "start"]
    expose:
      - "18789"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - OPENCLAW_CONFIG_PATH=/openclaw-data/openclaw.json
      - OPENCLAW_STATE_DIR=/openclaw-data/state
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-zeniclaw-gateway-secret}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - ./openclaw:/openclaw-data
      - openclaw_state:/openclaw-data/state
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:18789/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - default

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: zeniclaw
      POSTGRES_PASSWORD: zeniclaw
      POSTGRES_DB: zeniclaw
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeniclaw"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default

networks:
  coolify:
    external: true
  default:
    driver: bridge

volumes:
  postgres_data:
  openclaw_state:
