services:
  app:
    build: .
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-postgresql://zeniclaw:zeniclaw@db:5432/zeniclaw}
      - WAHA_URL=${WAHA_URL:-http://waha.sixzenith.space:3003}
      - WAHA_API_KEY=${WAHA_API_KEY:-666}
      - APP_URL=${APP_URL:-https://zeniclaw.zenova.id}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-}
      - AUTH_SECRET=${NEXTAUTH_SECRET:-}
    networks:
      - coolify
      - default

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: zeniclaw
      POSTGRES_PASSWORD: zeniclaw
      POSTGRES_DB: zeniclaw
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeniclaw"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default

networks:
  coolify:
    external: true
  default:
    driver: bridge

volumes:
  postgres_data:
