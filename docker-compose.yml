services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:main-amd64
    command: ["node", "openclaw.mjs", "gateway", "--bind", "lan", "--port", "18789", "--allow-unconfigured"]
    restart: unless-stopped
    expose:
      - "18789"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_API_KEY=${GEMINI_API_KEY:-}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - TZ=Asia/Jakarta
    volumes:
      # Mount config file directly — avoids build issues with custom Dockerfile
      - ./openclaw/openclaw.json:/home/node/.openclaw/openclaw.json:ro
      - ./skills/ceo-assistant/SKILL.md:/home/node/.openclaw/workspace/skills/ceo-assistant/SKILL.md:ro
      # Persistent data volumes for sessions and agents
      - openclaw-sessions:/home/node/.openclaw/sessions
      - openclaw-agents:/home/node/.openclaw/agents
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - default

  app:
    build: .
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-postgresql://zeniclaw:zeniclaw@db:5432/zeniclaw}
      - APP_URL=${APP_URL:-https://zeniclaw.zenova.id}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-}
      - AUTH_SECRET=${NEXTAUTH_SECRET:-}
      - OPENCLAW_URL=${OPENCLAW_URL:-http://openclaw:18789}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
    labels:
      - traefik.enable=true
      - traefik.http.routers.zeniclaw.rule=Host(`zeniclaw.zenova.id`)
      - traefik.http.routers.zeniclaw.entrypoints=https
      - traefik.http.routers.zeniclaw.tls=true
      - traefik.http.routers.zeniclaw.tls.certresolver=letsencrypt
      - traefik.http.services.zeniclaw.loadbalancer.server.port=3000
      - traefik.http.routers.zeniclaw-http.rule=Host(`zeniclaw.zenova.id`)
      - traefik.http.routers.zeniclaw-http.entrypoints=http
      - traefik.http.routers.zeniclaw-http.middlewares=redirect-to-https
    networks:
      - coolify
      - default

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: zeniclaw
      POSTGRES_PASSWORD: zeniclaw
      POSTGRES_DB: zeniclaw
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeniclaw"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default

networks:
  coolify:
    external: true
  default:
    driver: bridge

volumes:
  postgres_data:
  openclaw-sessions:
  openclaw-agents:
